name: CI

on:
    push:
        branches: [ "master" ]
    pull_request:
        branches: [ "master" ]

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '21'
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
            - name: Run checks
              run: ./gradlew --no-daemon check
